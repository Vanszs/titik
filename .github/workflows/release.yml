name: release

# Build the titik binary for every supported platform on a version-tag push and
# attach each one to the GitHub release. Asset names MUST match install.sh:
#   titik-linux-x64, titik-linux-arm64, titik-darwin-arm64, titik-darwin-x64
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----- Linux -----
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: titik-linux-x64
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: titik-linux-arm64
            cross: true
          # ----- macOS (Apple Silicon runner; x86_64 cross-compiles natively) -----
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: titik-darwin-arm64
            cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: titik-darwin-x64
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # The aarch64 Linux target needs a cross linker on the x86_64 runner.
      - name: Install aarch64 cross linker (Linux arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release -p agent --target ${{ matrix.target }}

      # The bin is named "titik" (see src-agent/Cargo.toml [[bin]]); rename to the
      # per-platform asset name so install.sh can fetch it directly.
      - name: Stage asset
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/titik" "${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
